<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="robots" content="noindex">
    <title>📚🎬 読書・映画記録</title>
	<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚🎬 読書・映画記録</h1>
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="books">📚 Books</button>
                <button class="tab-btn" data-tab="movies">🎬 Movies</button>
				<button class="tab-btn" data-tab="wishlist">📝 Wishlist</button>
				<button class="tab-btn" data-tab="stats">📊 Stats</button>
				<button class="tab-btn" data-tab="timeline">⌛ Timeline</button>
            </div>
        </header>

        <div id="booksTab" class="tab-content active">
            <div class="controls">
                <div class="search-area">
                    <input type="text" class="search-box" id="searchBoxBooks" placeholder="タイトル・著者・タグで検索...">
                    <select id="genreFilterBooks" class="genre-filter">
						<option value="">すべてのジャンル</option>
					</select>
					<button class="clear-btn" onclick="clearFilters('books')">すべてクリア</button>
                </div>
                <div class="sort-buttons">
                    <button class="sort-btn active" data-sort="date" data-type="books">
                        📅 読了日順 <span id="dateOrderBooks">↓</span>
                    </button>
                    <button class="sort-btn" data-sort="title" data-type="books">
                        🔤 タイトル順 <span id="titleOrderBooks">↑</span>
                    </button>
                    <button class="sort-btn" data-sort="rating" data-type="books">
                        ⭐ 評価順 <span id="ratingOrderBooks">↓</span>
                    </button>
                </div>
            </div>

            <div class="books-grid" id="booksGrid"></div>
            <div class="no-results" id="noResultsBooks" style="display: none;">
                検索結果が見つかりませんでした
            </div>
        </div>

        <div id="moviesTab" class="tab-content">
            <div class="controls">
                <div class="search-area">
                    <input type="text" class="search-box" id="searchBoxMovies" placeholder="タイトル・監督・タグで検索...">
                    <select id="genreFilterMovies" class="genre-filter">
						<option value="">すべてのジャンル</option>
					</select>
					<button class="clear-btn" onclick="clearFilters('movies')">すべてクリア</button>
                </div>
                <div class="sort-buttons">
                    <button class="sort-btn active" data-sort="date" data-type="movies">
                        📅 視聴日順 <span id="dateOrderMovies">↓</span>
                    </button>
                    <button class="sort-btn" data-sort="title" data-type="movies">
                        🔤 タイトル順 <span id="titleOrderMovies">↑</span>
                    </button>
                    <button class="sort-btn" data-sort="rating" data-type="movies">
                        ⭐ 評価順 <span id="ratingOrderMovies">↓</span>
                    </button>
                </div>
            </div>

            <div class="books-grid" id="moviesGrid"></div>
            <div class="no-results" id="noResultsMovies" style="display: none;">
                検索結果が見つかりませんでした
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose">×</button>
            <div class="modal-header">
                <div class="modal-cover" id="modalCover"></div>
                <div class="modal-basic-info">
                    <div class="modal-title" id="modalTitle"></div>
                    <div class="modal-author" id="modalAuthor"></div>
                    <div class="modal-date" id="modalDate"></div>
                    <div class="modal-rating" id="modalRating"></div>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <div class="modal-section-title" id="modalReviewTitle">📝 感想</div>
                    <div class="modal-section-content" id="modalReview"></div>
                </div>
                <div class="modal-section">

                    <div class="modal-section-title" id="modalSynopsisTitle">📖 本のあらすじ</div>
                    <div class="modal-section-content" id="modalSynopsis"></div>
                </div>
                <div class="modal-section">
                    <div class="modal-section-title">🏷️ タグ</div>
                    <div class="modal-tags" id="modalTags"></div>
                </div>
            </div>
        </div>
    </div>
	
	<!--統計-->
	<div id="statsTab" class="tab-content">
	<div class="year-selector">
        <button onclick="changeYear(-1)">◀</button>
        <h2 id="currentYearDisplay">すべて</h2>
        <button onclick="changeYear(1)">▶</button>
    </div>		
		
    <div class="stats-summary">
        <div class="stat-card">
            <h3>読書数</h3>
            <p id="totalBooks">0</p>
        </div>
        <div class="stat-card">
            <h3>映画数</h3>
            <p id="totalMovies">0</p>
        </div>
        <div class="stat-card">
            <h3>平均評価</h3>
            <p id="avgRating">0.0</p>
        </div>
    </div>
	<div class="canvas-wrapper">
        <canvas id="genreChart"></canvas>
		<div id="customLegend" class="custom-legend"></div>
    </div>
	
	<div class="stats-container">
        <canvas id="yearlyChart"></canvas>
    </div>		
    </div>
	
	<!-- 月間リスト表示用のミニ・モーダル -->
　　<div id="monthlyModal" class="modal">
    <div class="modal-content mini-modal">
        <div class="modal-header">
            <h3 id="monthlyModalTitle">月間記録</h3>
            <button class="modal-close" id="monthlyModalClose">×</button>
        </div>
        <div id="monthlyListContainer" class="mini-card-grid"></div>
    </div>
　　</div>
	
	<!--タイムライン-->
	<div id="timelineTab" class="tab-content">
    <div class="timeline-container" id="timelineContainer"></div>
	</div>
	
	<!--wishlist-->
	<div id="wishlistTab" class="tab-content">
    <div id="wishlistGrid" class="wish-grid"></div>
	</div>
	
	<div id="wishDoneModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
        <div class="modal-header">
            <h3>🎉 読了・鑑賞おめでとう！</h3>
            <button class="modal-close" id="wishDoneClose">×</button>
        </div>
        <div class="wish-done-body" style="padding: 20px;">
            <p id="wishDoneItemName" style="font-weight: bold; margin-bottom: 20px; color: #333; font-size: 1.1rem; border-left: 4px solid #764ba2; padding-left: 10px;"></p>
            
            <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: #666;">
				評価：<span id="starValue" style="font-weight: bold; color: #ffca28; font-size: 1.2rem;">3.0</span>
			</label>
			<div class="star-rating-container">
			<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
			<span style="font-size: 0.9rem; color: #666;">評価</span>
			<span id="starValue" style="font-weight: bold; color: #ffca28; font-size: 1.5rem;">3.0</span>
			</div>
			<input type="range" id="ratingRange" min="0" max="5" step="0.5" value="3.0" oninput="updateStars(this.value)">
			</div>

            <label for="doneDate" style="display: block; margin: 15px 0 5px; font-size: 0.9rem; color: #666;">完了日</label>
			<input type="date" id="doneDate" class="wish-done-input">

            <label for="doneMemo" style="display: block; margin: 15px 0 5px; font-size: 0.9rem; color: #666;">感想・メモ</label>
            <textarea id="doneMemo" rows="4" placeholder="どんなところが良かった？" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit;"></textarea>

            <button id="submitDoneBtn" class="submit-btn">この内容で記録に保存する</button>
            <p style="text-align: center; font-size: 0.8rem; color: #999; margin-top: 10px;">※送信するとWishlistから削除されます</p>
        </div>
    </div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
	
</body>
</html>
